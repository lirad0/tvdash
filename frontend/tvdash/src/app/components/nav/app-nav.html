<nav class="h-full min-h-screen w-full bg-neutral-primary text-white flex flex-col items-center py-4">
	@if (showBackButton) {
		<button pButton type="button" class="p-button-rounded p-button-text mb-4" (click)="back($event)" aria-label="Back">
			<img src="/ui/back.svg" alt="Back" />
		</button>
	}

	@if (showCustomizeButton) {
		<button pButton type="button" class="p-button-rounded p-button-text mb-4" (click)="customize()" aria-label="Settings">
			<img src="/ui/customize.svg" alt="Settings" />
		</button>
	}

	@if (showAddButton) {
		<button pButton type="button" class="p-button-rounded p-button-text mb-4" (click)="open()" aria-label="Add">
			<img src="/ui/add.svg" alt="Add" />
		</button>
	}
</nav>

<!-- Backdrop -->

@if (visible) {
	<div class="fixed inset-0 bg-black/70 z-40" (click)="close()"></div>
}

<!-- Slide-in panel -->
<div class="s-in-panel app-v-scrollbar fixed top-0 left-0 h-full z-50 transform bg-neutral-950/95 border-r border-neutral-primary-soft/20 text-white shadow-2xl shadow-neutral-primary/10 w-[100vw] lg:w-[768px]"
	[style.transition]="closeInstantly ? 'none' : 'transform 0.3s'"
	[style.transform]="getSidebarTranslation(visible)">
	<div class="flex justify-between items-center mb-4 p-4">
		<h3 class="m-0 text-lg font-semibold text-neutral-primary">Settings</h3>
		<button pButton type="button" class="p-button-text text-neutral-primary-soft" (click)="close()">✕</button>
	</div>

	<form (ngSubmit)="save()" [formGroup]="form" enctype="multipart/form-data" class="s-in-panel__f space-y-5 p-4">
		<div>
			<label for="name" class="block mb-2 text-sm font-semibold text-neutral-primary-soft">Name</label>
			<input formControlName="name" type="text" id="name" name="name" class="w-full rounded-xl border border-neutral-primary-soft/30 bg-neutral-900/90 px-3 py-2 text-white placeholder:text-neutral-primary-soft focus:border-neutral-primary focus:ring-2 focus:ring-neutral-primary/20 outline-none" placeholder="Name" />
		</div>

		<div>
			<label for="url" class="block mb-2 text-sm font-semibold text-neutral-primary-soft">URL</label>
			<input formControlName="url" type="text" id="url" name="url" class="w-full rounded-xl border border-neutral-primary-soft/30 bg-neutral-900/90 px-3 py-2 text-white placeholder:text-neutral-primary-soft focus:border-neutral-primary focus:ring-2 focus:ring-neutral-primary/20 outline-none" placeholder="URL" />
		</div>

		<div class="s-in-panel__f__img-r">
			<label for="file" class="block mb-2 text-sm font-semibold text-neutral-primary-soft">Image</label>
			<input formControlName="file" type="file" id="file" name="file" (change)="onFileChange($event)" accept="image/*" class="text-neutral-primary-soft" />
			
			@if (imageDataUrl()) {
				<div class="mt-2 rounded-xl border border-neutral-primary-soft/20 bg-neutral-950 p-2 w-32">
					<img [src]="imageDataUrl()" alt="preview" class="w-full rounded-lg" />
				</div>
			}

		</div>

		<div class="mt-4 flex justify-end gap-2">
			<button pButton type="submit" class="p-button">Add item</button>
		</div>
	</form>

	<div class="flex justify-center p-4 mt-16">
		<button pButton type="button" class="p-button-primary colorw-32" (click)="close()">Close</button>
	</div>
</div>
